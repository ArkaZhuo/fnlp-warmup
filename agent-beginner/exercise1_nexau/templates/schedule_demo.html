<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>练习一：日程 Agent Demo</title>
    <style>
      :root {
        --bg: #eef0e8;
        --paper: #fffdf6;
        --ink: #20231f;
        --muted: #6f746b;
        --line: #ddd5c4;
        --accent: #1f6b57;
        --accent-2: #d88934;
        --danger: #b94c38;
        --shadow: 0 18px 48px rgba(55, 48, 35, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        font-family: "Avenir Next", "Segoe UI", "Noto Sans CJK SC", sans-serif;
        background:
          linear-gradient(115deg, rgba(31, 107, 87, 0.16), transparent 36%),
          radial-gradient(circle at 88% 12%, rgba(216, 137, 52, 0.24), transparent 28%),
          var(--bg);
      }

      .page {
        max-width: 1220px;
        margin: 0 auto;
        padding: 34px 22px 44px;
      }

      .hero {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 18px;
        align-items: end;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0;
        font-size: clamp(34px, 5vw, 62px);
        line-height: 0.96;
        letter-spacing: -2px;
      }

      .subtitle {
        max-width: 720px;
        margin: 14px 0 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.7;
      }

      .badge {
        padding: 12px 16px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 253, 246, 0.72);
        color: var(--accent);
        font-weight: 700;
        white-space: nowrap;
      }

      .layout {
        display: grid;
        grid-template-columns: 420px 1fr;
        gap: 18px;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 28px;
        background: rgba(255, 253, 246, 0.92);
        box-shadow: var(--shadow);
      }

      .panel {
        padding: 22px;
      }

      .section-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 16px;
      }

      h2 {
        margin: 0;
        font-size: 22px;
      }

      .hint {
        color: var(--muted);
        font-size: 13px;
      }

      label {
        display: block;
        margin: 13px 0 7px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      select,
      input,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: #fffaf0;
        color: var(--ink);
        padding: 12px 13px;
        font: inherit;
        outline: none;
      }

      textarea {
        min-height: 190px;
        resize: vertical;
        line-height: 1.55;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 16px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 11px 16px;
        background: var(--accent);
        color: white;
        font: 800 14px "Avenir Next", "Segoe UI", sans-serif;
        cursor: pointer;
        transition: transform 0.15s ease, opacity 0.15s ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      button.secondary {
        background: #e9dfcd;
        color: var(--ink);
      }

      button.ghost {
        border: 1px solid var(--line);
        background: transparent;
        color: var(--ink);
      }

      button.danger {
        background: var(--danger);
      }

      .status {
        min-height: 30px;
        margin-top: 14px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.55;
        white-space: pre-wrap;
      }

      .timeline {
        display: grid;
        gap: 12px;
        max-height: 760px;
        overflow: auto;
        padding-right: 4px;
      }

      .event {
        border: 1px solid var(--line);
        border-radius: 22px;
        background: #fffaf0;
        padding: 16px;
      }

      .event.cancelled {
        opacity: 0.56;
      }

      .event-head {
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 8px;
      }

      .event-title {
        font-size: 17px;
        font-weight: 850;
      }

      .pill {
        border-radius: 999px;
        padding: 4px 9px;
        background: #e9dfcd;
        color: var(--accent);
        font-size: 12px;
        font-weight: 800;
      }

      .time {
        color: var(--accent);
        font-weight: 700;
        font-size: 14px;
      }

      .desc {
        margin: 8px 0 12px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }

      .mini-form {
        display: grid;
        gap: 8px;
        margin-top: 12px;
      }

      .empty {
        border: 1px dashed var(--line);
        border-radius: 22px;
        padding: 28px;
        color: var(--muted);
        background: rgba(255, 250, 240, 0.6);
        text-align: center;
      }

      .manual {
        margin-top: 18px;
      }

      @media (max-width: 930px) {
        .hero,
        .layout,
        .row {
          grid-template-columns: 1fr;
        }

        .badge {
          width: fit-content;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <div>
          <h1>日程 Agent Demo</h1>
          <p class="subtitle">
            选择一种输入源：飞书文档、Markdown 笔记或聊天记录。系统会抽取时间和事件，调用日程工具创建或更新日程。
          </p>
        </div>
        <div class="badge">NexAU Tool Calling · {{ timezone }}</div>
      </section>

      <section class="layout">
        <div>
          <div class="card panel">
            <div class="section-title">
              <h2>输入源</h2>
              <span class="hint">文档 -> 工具 -> 日程</span>
            </div>

            <label for="sourceType">类型</label>
            <select id="sourceType" onchange="applyPreset()">
              <option value="feishu">飞书文档链接</option>
              <option value="markdown">Markdown 笔记</option>
              <option value="chat">聊天记录</option>
            </select>

            <label for="sourceValue">内容 / 文件路径 / 飞书链接</label>
            <textarea id="sourceValue"></textarea>

            <div class="row">
              <div>
                <label for="mode">模式</label>
                <select id="mode">
                  <option value="upsert">upsert（创建或更新）</option>
                  <option value="create">create（只创建）</option>
                </select>
              </div>
              <div>
                <label for="calendarId">飞书日历 ID</label>
                <input id="calendarId" value="primary" />
              </div>
            </div>

            <label>
              <input id="syncCalendar" type="checkbox" style="width: auto; margin-right: 6px;" />
              同步到飞书真实日历
            </label>

            <div class="actions">
              <button onclick="syncSource()">同步日程</button>
              <button class="secondary" onclick="applyPreset()">填入示例</button>
              <button class="ghost" onclick="resetDemo()">清空</button>
            </div>
            <div id="ingestStatus" class="status"></div>
          </div>

          <div class="card panel manual">
            <div class="section-title">
              <h2>手动创建</h2>
              <span class="hint">用于展示 create 工具</span>
            </div>
            <label for="title">标题</label>
            <input id="title" value="项目复盘会议" />
            <div class="row">
              <div>
                <label for="startTime">开始</label>
                <input id="startTime" value="2026-04-18 10:00" />
              </div>
              <div>
                <label for="endTime">结束</label>
                <input id="endTime" value="2026-04-18 11:00" />
              </div>
            </div>
            <label for="description">说明</label>
            <input id="description" value="手动创建演示" />
            <div class="actions">
              <button class="secondary" onclick="createEvent()">创建</button>
            </div>
            <div id="formStatus" class="status"></div>
          </div>
        </div>

        <div class="card panel">
          <div class="section-title">
            <h2>日程结果</h2>
            <span class="hint">可直接修改或取消</span>
          </div>
          <div class="row">
            <input id="keyword" placeholder="关键词过滤，例如：会议 / 接口 / 聚餐" />
            <div class="actions" style="margin-top: 0;">
              <button onclick="loadEvents()">查询</button>
              <button class="ghost" onclick="clearKeywordAndLoad()">全部</button>
            </div>
          </div>
          <div id="listStatus" class="status"></div>
          <div id="eventList" class="timeline"></div>
        </div>
      </section>
    </main>

    <script>
      const timezone = "{{ timezone }}";
      const presets = {
        feishu: "https://wcnmcvjcsxin.feishu.cn/wiki/GpwnwG2UQiZ0bukNKDLcqoHvntd",
        markdown: "- 2026-04-18 10:00-11:00 项目复盘会议\\n- 2026-04-19 15:00-16:00 客户沟通",
        chat: "[2026-04-09 18:02] 张三: 咱们 2026-04-13 10:00 开站会\\n[2026-04-09 18:03] 李四: 明天 15:00 一起看接口联调\\n[2026-04-09 18:04] 张三: 04-14 19:30 团队聚餐",
      };

      function setStatus(id, text) {
        document.getElementById(id).textContent = text || "";
      }

      function applyPreset() {
        const type = document.getElementById("sourceType").value;
        document.getElementById("sourceValue").value = presets[type];
        document.getElementById("syncCalendar").checked = type === "feishu";
      }

      async function requestJson(url, options = {}) {
        const response = await fetch(url, {
          headers: { "Content-Type": "application/json" },
          ...options,
        });
        const payload = await response.json();
        if (!response.ok) {
          throw new Error(JSON.stringify(payload.detail || payload, null, 2));
        }
        return payload;
      }

      async function syncSource() {
        try {
          setStatus("ingestStatus", "正在同步...");
          const payload = await requestJson("/api/demo/ingest", {
            method: "POST",
            body: JSON.stringify({
              source_type: document.getElementById("sourceType").value,
              source_value: document.getElementById("sourceValue").value,
              mode: document.getElementById("mode").value,
              timezone,
              sync_feishu_calendar: document.getElementById("syncCalendar").checked,
              feishu_calendar_id: document.getElementById("calendarId").value || "primary",
            }),
          });
          const syncInfo = payload.feishu_calendar_sync || {};
          const syncText = syncInfo.enabled
            ? `；飞书日历新增 ${syncInfo.synced_created_count || 0} 条，更新 ${syncInfo.synced_updated_count || 0} 条`
            : "";
          setStatus(
            "ingestStatus",
            `完成：新增 ${payload.created_count} 条，更新 ${payload.updated_count} 条，跳过 ${payload.skipped_count} 条${syncText}`
          );
          document.getElementById("keyword").value = "";
          await loadEvents();
        } catch (error) {
          setStatus("ingestStatus", `同步失败：${error.message}`);
        }
      }

      async function createEvent() {
        try {
          const payload = await requestJson("/api/events", {
            method: "POST",
            body: JSON.stringify({
              title: document.getElementById("title").value,
              start_time: document.getElementById("startTime").value,
              end_time: document.getElementById("endTime").value,
              timezone,
              description: document.getElementById("description").value,
            }),
          });
          setStatus("formStatus", `创建成功：${payload.event.title}`);
          document.getElementById("keyword").value = "";
          await loadEvents();
        } catch (error) {
          setStatus("formStatus", `创建失败：${error.message}`);
        }
      }

      async function resetDemo() {
        try {
          await requestJson("/api/demo/reset", { method: "POST" });
          setStatus("ingestStatus", "已清空演示数据");
          document.getElementById("keyword").value = "";
          await loadEvents();
        } catch (error) {
          setStatus("ingestStatus", `清空失败：${error.message}`);
        }
      }

      async function loadEvents() {
        try {
          const keyword = encodeURIComponent(document.getElementById("keyword").value);
          const payload = await requestJson(`/api/events?include_cancelled=true&keyword=${keyword}`);
          renderEvents(payload.events || []);
          setStatus("listStatus", `共 ${payload.count} 条`);
        } catch (error) {
          setStatus("listStatus", `查询失败：${error.message}`);
        }
      }

      async function clearKeywordAndLoad() {
        document.getElementById("keyword").value = "";
        await loadEvents();
      }

      async function updateEvent(eventId) {
        const prefix = `edit-${eventId}`;
        try {
          const payload = await requestJson(`/api/events/${eventId}`, {
            method: "PATCH",
            body: JSON.stringify({
              title: document.getElementById(`${prefix}-title`).value,
              start_time: document.getElementById(`${prefix}-start`).value,
              end_time: document.getElementById(`${prefix}-end`).value,
              timezone,
              description: document.getElementById(`${prefix}-description`).value,
            }),
          });
          setStatus("listStatus", `修改成功：${payload.event.title}`);
          await loadEvents();
        } catch (error) {
          setStatus("listStatus", `修改失败：${error.message}`);
        }
      }

      async function cancelEvent(eventId) {
        try {
          const payload = await requestJson(`/api/events/${eventId}/cancel`, { method: "POST" });
          setStatus("listStatus", `已取消：${payload.event.title}`);
          await loadEvents();
        } catch (error) {
          setStatus("listStatus", `取消失败：${error.message}`);
        }
      }

      function renderEvents(events) {
        const list = document.getElementById("eventList");
        list.innerHTML = "";
        if (!events.length) {
          list.innerHTML = '<div class="empty">暂无日程。请选择左侧输入源并同步。</div>';
          return;
        }

        for (const event of events) {
          const item = document.createElement("div");
          item.className = `event ${event.status === "cancelled" ? "cancelled" : ""}`;
          const prefix = `edit-${event.id}`;
          const source = event.source_type || "manual";
          item.innerHTML = `
            <div class="event-head">
              <div>
                <div class="event-title">${escapeHtml(event.title)}</div>
                <div class="time">${escapeHtml(event.start_time)} -> ${escapeHtml(event.end_time)}</div>
              </div>
              <span class="pill">${escapeHtml(source)}</span>
            </div>
            <div class="desc">${escapeHtml(event.description || "")}</div>
            <div class="mini-form">
              <input id="${prefix}-title" value="${escapeAttr(event.title)}" />
              <div class="row">
                <input id="${prefix}-start" value="${escapeAttr(event.start_time.slice(0, 16).replace("T", " "))}" />
                <input id="${prefix}-end" value="${escapeAttr(event.end_time.slice(0, 16).replace("T", " "))}" />
              </div>
              <input id="${prefix}-description" value="${escapeAttr(event.description || "")}" />
            </div>
            <div class="actions">
              <button onclick="updateEvent('${event.id}')">保存修改</button>
              <button class="danger" onclick="cancelEvent('${event.id}')">取消</button>
            </div>
          `;
          list.appendChild(item);
        }
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function escapeAttr(value) {
        return escapeHtml(value);
      }

      applyPreset();
      loadEvents();
    </script>
  </body>
</html>
