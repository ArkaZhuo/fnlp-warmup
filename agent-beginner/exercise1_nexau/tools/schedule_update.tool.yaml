type: tool
name: schedule_update
description: >-
  Update an existing event by event_id. If event_id is unknown, query candidate events first.
input_schema:
  type: object
  properties:
    event_id:
      type: string
    title:
      type: string
    start_time:
      type: string
    end_time:
      type: string
    timezone:
      type: string
    description:
      type: string
    location:
      type: string
    status:
      type: string
      enum: [confirmed, pending, cancelled]
    allow_conflict:
      type: boolean
  required:
    - event_id
  additionalProperties: false
  $schema: http://json-schema.org/draft-07/schema#
